# ============================================================
# Hospital Management System - Application Configuration
# ============================================================

# ---------- Server ----------
server.port=${SERVER_PORT:8080}

# ---------- Database (MySQL) ----------
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hms_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:ranjith64}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------- JPA / Hibernate ----------
# ddl-auto=update -> Hibernate auto-creates/updates tables from the @Entity classes on startup.
# If you already ran database/schema.sql manually, this is safe to leave as "update" too -
# Hibernate will just confirm the tables match and won't recreate them.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ---------- JWT ----------
app.jwt.secret=${JWT_SECRET:c29tZXZlcnlsb25nc2VjcmV0a2V5Zm9yaG9zcGl0YWxtYW5hZ2VtZW50c3lzdGVtand0dG9rZW5zaWduaW5n}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---------- Swagger / OpenAPI ----------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ---------- Logging ----------
logging.level.com.hms=INFO
