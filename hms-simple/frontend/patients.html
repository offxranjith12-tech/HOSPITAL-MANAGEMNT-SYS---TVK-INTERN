<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Patients - HMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <nav class="sidebar">
    <h4>HMS</h4>
    <a class="nav-link" href="dashboard.html">Dashboard</a>
    <a class="nav-link" href="doctors.html">Doctors</a>
    <a class="nav-link" href="patients.html">Patients</a>
    <a class="nav-link" href="appointments.html">Appointments</a>
    <a class="nav-link" href="medical-records.html">Medical Records</a>
    <a class="nav-link" href="bills.html">Billing</a>
  </nav>

  <div class="main-content">
    <div class="topbar">
      <div>
        <h4 class="mb-0">Patients</h4>
        <span id="userInfo" class="text-muted small"></span>
      </div>
      <button id="logoutBtn" class="btn btn-danger btn-sm">Logout</button>
    </div>

    <div class="card p-3">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">All Patients</h5>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#patientModal" id="addPatientBtn">+ Register Patient</button>
      </div>
      <div id="errorBox" class="alert alert-danger py-2 d-none"></div>
      <table class="table">
        <thead>
          <tr><th>Name</th><th>DOB</th><th>Gender</th><th>Phone</th><th>Email</th><th>Actions</th></tr>
        </thead>
        <tbody id="patientsTableBody">
          <tr><td colspan="6">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Add/Edit Patient Modal -->
<div class="modal fade" id="patientModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="patientModalTitle">Register Patient</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="patientForm">
        <div class="modal-body">
          <div id="modalErrorBox" class="alert alert-danger py-2 d-none"></div>
          <input type="hidden" id="patientId">
          <div class="mb-3">
            <label class="form-label small fw-bold">Name</label>
            <input type="text" class="form-control" id="patientName" required>
          </div>
          <div class="row">
            <div class="col-6 mb-3">
              <label class="form-label small fw-bold">Date of Birth</label>
              <input type="date" class="form-control" id="patientDob">
            </div>
            <div class="col-6 mb-3">
              <label class="form-label small fw-bold">Gender</label>
              <select class="form-select" id="patientGender">
                <option value="">--</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Phone</label>
            <input type="text" class="form-control" id="patientPhone">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Email</label>
            <input type="email" class="form-control" id="patientEmail">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Address</label>
            <textarea class="form-control" id="patientAddress" rows="2"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/patients.js"></script>
</body>
</html>
