<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Register - Hospital Management System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-box" style="width:400px;">
    <h3>Create an Account</h3>
    <p class="text-muted small mb-4">Register a new staff account</p>

    <div id="errorBox" class="alert alert-danger py-2 d-none"></div>
    <div id="successBox" class="alert alert-success py-2 d-none"></div>

    <form id="registerForm">
      <div class="mb-3">
        <label class="form-label small fw-bold">Full Name</label>
        <input type="text" class="form-control" id="fullName" required>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-bold">Username</label>
        <input type="text" class="form-control" id="username" required>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-bold">Email</label>
        <input type="email" class="form-control" id="email" required>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-bold">Role</label>
        <select class="form-select" id="role">
          <option value="ROLE_RECEPTIONIST">Receptionist</option>
          <option value="ROLE_DOCTOR">Doctor</option>
          <option value="ROLE_ADMIN">Admin</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-bold">Password</label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-bold">Confirm Password</label>
        <input type="password" class="form-control" id="confirmPassword" required>
      </div>
      <button type="submit" class="btn btn-primary w-100" id="registerBtn">Create Account</button>
    </form>

    <p class="text-center small mt-3 mb-0">
      Already have an account? <a href="login.html">Sign in</a>
    </p>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  const form = document.getElementById("registerForm");
  const errorBox = document.getElementById("errorBox");
  const successBox = document.getElementById("successBox");
  const registerBtn = document.getElementById("registerBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBox.classList.add("d-none");
    successBox.classList.add("d-none");

    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (password !== confirmPassword) {
      errorBox.textContent = "Passwords do not match";
      errorBox.classList.remove("d-none");
      return;
    }
    if (password.length < 6) {
      errorBox.textContent = "Password must be at least 6 characters";
      errorBox.classList.remove("d-none");
      return;
    }

    registerBtn.disabled = true;
    registerBtn.textContent = "Creating account...";

    try {
      await apiRequest("/auth/register", {
        method: "POST",
        body: {
          fullName: document.getElementById("fullName").value,
          username: document.getElementById("username").value,
          email: document.getElementById("email").value,
          password: password,
          roles: [document.getElementById("role").value],
        },
      });
      successBox.textContent = "Account created! Redirecting to login...";
      successBox.classList.remove("d-none");
      setTimeout(() => { window.location.href = "login.html"; }, 1200);
    } catch (err) {
      errorBox.textContent = err.message || "Registration failed";
      errorBox.classList.remove("d-none");
    } finally {
      registerBtn.disabled = false;
      registerBtn.textContent = "Create Account";
    }
  });
</script>
</body>
</html>
