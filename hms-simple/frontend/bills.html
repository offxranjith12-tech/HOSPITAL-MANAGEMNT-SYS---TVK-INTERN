<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Billing - HMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <nav class="sidebar">
    <h4> HMS</h4>
    <a class="nav-link" href="dashboard.html">Dashboard</a>
    <a class="nav-link" href="doctors.html">Doctors</a>
    <a class="nav-link" href="patients.html">Patients</a>
    <a class="nav-link" href="appointments.html">Appointments</a>
    <a class="nav-link" href="medical-records.html">Medical Records</a>
    <a class="nav-link" href="bills.html">Billing</a>
  </nav>

  <div class="main-content">
    <div class="topbar">
      <div>
        <h4 class="mb-0">Billing</h4>
        <span id="userInfo" class="text-muted small"></span>
      </div>
      <button id="logoutBtn" class="btn btn-danger btn-sm">Logout</button>
    </div>

    <div class="card p-3">
      <div class="d-flex justify-content-between align-items-end mb-3 gap-3">
        <div class="flex-grow-1">
          <label class="form-label small fw-bold">Select Patient</label>
          <select class="form-select" id="patientSelect">
            <option value="">-- Select Patient --</option>
          </select>
        </div>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#billModal" id="addBillBtn">+ New Bill</button>
      </div>
      <div id="errorBox" class="alert alert-danger py-2 d-none"></div>
      <table class="table">
        <thead>
          <tr><th>Date</th><th>Amount</th><th>Description</th><th>Status</th></tr>
        </thead>
        <tbody id="billsTableBody">
          <tr><td colspan="4">Select a patient to view bills.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- New Bill Modal -->
<div class="modal fade" id="billModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">New Bill</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="billForm">
        <div class="modal-body">
          <div id="modalErrorBox" class="alert alert-danger py-2 d-none"></div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Patient</label>
            <select class="form-select" id="billPatient" required>
              <option value="">-- Select Patient --</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Amount</label>
            <input type="number" step="0.01" class="form-control" id="billAmount" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Description</label>
            <textarea class="form-control" id="billDescription" rows="2"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Status</label>
            <select class="form-select" id="billStatus">
              <option value="PENDING">Pending</option>
              <option value="PAID">Paid</option>
              <option value="CANCELLED">Cancelled</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/bills.js"></script>
</body>
</html>
