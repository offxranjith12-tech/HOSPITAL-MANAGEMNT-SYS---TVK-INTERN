<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Appointments - HMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <nav class="sidebar">
    <h4> HMS</h4>
    <a class="nav-link" href="dashboard.html">Dashboard</a>
    <a class="nav-link" href="doctors.html">Doctors</a>
    <a class="nav-link" href="patients.html">Patients</a>
    <a class="nav-link" href="appointments.html">Appointments</a>
    <a class="nav-link" href="medical-records.html">Medical Records</a>
    <a class="nav-link" href="bills.html">Billing</a>
  </nav>

  <div class="main-content">
    <div class="topbar">
      <div>
        <h4 class="mb-0">Appointments</h4>
        <span id="userInfo" class="text-muted small"></span>
      </div>
      <button id="logoutBtn" class="btn btn-danger btn-sm">Logout</button>
    </div>

    <div class="card p-3">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">All Appointments</h5>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#appointmentModal" id="addAppointmentBtn">+ Book Appointment</button>
      </div>
      <div id="errorBox" class="alert alert-danger py-2 d-none"></div>
      <table class="table">
        <thead>
          <tr><th>Doctor</th><th>Patient</th><th>Date/Time</th><th>Status</th><th>Reason</th><th>Actions</th></tr>
        </thead>
        <tbody id="appointmentsTableBody">
          <tr><td colspan="6">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Book Appointment Modal -->
<div class="modal fade" id="appointmentModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Book Appointment</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="appointmentForm">
        <div class="modal-body">
          <div id="modalErrorBox" class="alert alert-danger py-2 d-none"></div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Doctor</label>
            <select class="form-select" id="appointmentDoctor" required>
              <option value="">-- Select Doctor --</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Patient</label>
            <select class="form-select" id="appointmentPatient" required>
              <option value="">-- Select Patient --</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Date & Time</label>
            <input type="datetime-local" class="form-control" id="appointmentDateTime" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Reason</label>
            <textarea class="form-control" id="appointmentReason" rows="2"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Book</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/appointments.js"></script>
</body>
</html>
