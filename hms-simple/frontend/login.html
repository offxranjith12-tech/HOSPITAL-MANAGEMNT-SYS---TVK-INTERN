<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login - Hospital Management System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-box">
    <h3> Hospital Management System</h3>
    <p class="text-muted small mb-4">Sign in to continue</p>

    <div id="errorBox" class="alert alert-danger py-2 d-none"></div>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label small fw-bold">Username</label>
        <input type="text" class="form-control" id="username" value="admin" required>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-bold">Password</label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100" id="loginBtn">Sign in</button>
    </form>

    <!-- <p class="text-muted small mt-3 mb-0">
      Default admin: <strong>admin / Admin@123</strong> (change after first login)
    </p> -->
    <p class="text-center small mt-2 mb-0">
      Don't have an account? <a href="register.html">Create one</a>
    </p>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  // If already logged in, skip straight to the dashboard.
  if (localStorage.getItem("token")) {
    window.location.href = "dashboard.html";
  }

  const form = document.getElementById("loginForm");
  const errorBox = document.getElementById("errorBox");
  const loginBtn = document.getElementById("loginBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBox.classList.add("d-none");
    loginBtn.disabled = true;
    loginBtn.textContent = "Signing in...";

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    try {
      const data = await apiRequest("/auth/login", { method: "POST", body: { username, password } });
      localStorage.setItem("token", data.token);
      localStorage.setItem("user", JSON.stringify(data));
      window.location.href = "dashboard.html";
    } catch (err) {
      errorBox.textContent = err.message || "Invalid username or password";
      errorBox.classList.remove("d-none");
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = "Sign in";
    }
  });
</script>
</body>
</html>
