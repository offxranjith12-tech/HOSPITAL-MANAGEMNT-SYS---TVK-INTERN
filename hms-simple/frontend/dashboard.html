<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard - HMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <nav class="sidebar">
    <h4> HMS</h4>
    <a class="nav-link" href="dashboard.html">Dashboard</a>
    <a class="nav-link" href="doctors.html">Doctors</a>
    <a class="nav-link" href="patients.html">Patients</a>
    <a class="nav-link" href="appointments.html">Appointments</a>
    <a class="nav-link" href="medical-records.html">Medical Records</a>
    <a class="nav-link" href="bills.html">Billing</a>
  </nav>

  <div class="main-content">
    <div class="topbar">
      <div>
        <h4 class="mb-0">Dashboard</h4>
        <span id="userInfo" class="text-muted small"></span>
      </div>
      <button id="logoutBtn" class="btn btn-danger btn-sm">Logout</button>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <div class="card stat-card p-3">
          <div class="num" id="statDoctors">-</div>
          <div class="label">Doctors</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card stat-card p-3">
          <div class="num" id="statPatients">-</div>
          <div class="label">Patients</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card stat-card p-3">
          <div class="num" id="statAppointments">-</div>
          <div class="label">Appointments</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card stat-card p-3">
          <div class="num">-</div>
          <div class="label">Revenue (see Billing)</div>
        </div>
      </div>
    </div>

    <div class="card p-4">
      <h5>Welcome to the Hospital Management System</h5>
      <p class="text-muted small mb-0">Use the sidebar to manage doctors, patients, appointments, medical records and billing.</p>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
